version: '3.8'

services:
  # Backend API - Node.js/Express
  backend:
    build: ./backend
    container_name: geovisor-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  # Frontend - Nginx sirviendo el build de React + proxy reverso
  frontend:
    build: ./frontend
    container_name: geovisor-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
